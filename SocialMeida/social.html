<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social | Connect & Share</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="social-style.css">
</head>

<body>

<section id="auth-section" class="auth-page">
<div class="auth-container">

<h1 class="logo">SOCIAL</h1>
<p class="text-muted small mb-4">Connect with your digital world</p>

<div class="auth-tabs">
<button id="tab-login" class="auth-tab active" onclick="toggleAuth('login')">Login</button>
<button id="tab-signup" class="auth-tab" onclick="toggleAuth('signup')">Sign Up</button>
</div>

<div id="signup-fields" class="d-none">

<input id="auth-email" class="form-input" placeholder="Email">
<input id="auth-mobile" class="form-input" placeholder="Mobile Number">

</div>

<input id="auth-user" class="form-input" placeholder="Username">

<input id="auth-pass" type="password" class="form-input" placeholder="Password">

<input id="auth-confirm" type="password" class="form-input d-none" placeholder="Confirm Password">

<p class="forgot-link" onclick="showForgot()">Forgot Password?</p>

<button id="auth-btn" class="btn-main-glow w-100 mt-3">CONTINUE</button>

<div id="forgot-box" class="d-none mt-3">

<input id="forgot-user" class="form-input" placeholder="Username or Email">

<button class="btn-main-glow w-100 mt-2" onclick="resetPassword()">Send Reset Link</button>

</div>

</div>
</section>


<main id="app-section" class="d-none">

<nav class="app-navbar">
<div class="container d-flex justify-content-between align-items-center">

<h3 class="logo">SOCIAL</h3>

<div>
<span id="nav-username" class="fw-bold me-3"></span>
<button class="btn btn-sm btn-outline-danger" onclick="logout()">Logout</button>
</div>

</div>
</nav>

<div class="container mt-4">

<div class="row">

<div class="col-lg-8" id="feed-container"></div>

<div class="col-lg-4">

<div class="card p-3 border-0 shadow-sm rounded-4">

<h6 class="fw-bold">🔥 Trending</h6>

<ul class="trend-list">

<li>#GuardianCloud</li>
<li>#AI_Safety</li>
<li>#CyberSecurity</li>
<li>#CloudComputing</li>

</ul>

</div>

</div>

</div>

</div>

</main>


<div class="modal fade" id="commentModal">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content border-0 rounded-4 p-3">

<h6 class="fw-bold">Comments</h6>

<div id="modal-comment-list" class="my-3" style="max-height: 300px; overflow-y: auto;"></div>

<input id="modal-input" class="comment-input" placeholder="Write a comment...">

<button id="modal-post-btn" class="btn-send mt-2">Post</button>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.0/dist/amazon-cognito-identity.min.js"></script>
<script src="social-script.js"></script>

</body>
</html>
